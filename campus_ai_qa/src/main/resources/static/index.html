<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
        }
        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 30px;
        }
        .chat-box {
            height: 500px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            background-color: #f7fafc;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
        }
        .user-message {
            background-color: #3182ce;
            color: white;
            margin-left: auto;
        }
        .ai-message {
            background-color: #e2e8f0;
            color: #2d3748;
            margin-right: auto;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #questionInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            /* 强制可输入，解决只读问题 */
            pointer-events: auto;
            user-select: text;
        }
        #sendBtn {
            padding: 12px 24px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Campus AI Assistant</h1>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <input 
                type="text" 
                id="questionInput" 
                placeholder="Ask a question in English..."
                autocomplete="off"
            >
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');

        // 确保输入框可聚焦
        questionInput.focus();

        function addMessage(content, isUser) {
            const msg = document.createElement('div');
            msg.className = isUser ? 'message user-message' : 'message ai-message';
            msg.textContent = content;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function send() {
            const q = questionInput.value.trim();
            if (!q) return;
            
            addMessage(q, true);
            questionInput.value = '';
            questionInput.focus(); // 发送后自动聚焦输入框

            try {
                const res = await fetch('/api/ai/ask?question=' + encodeURIComponent(q));
                const text = await res.text();
                addMessage(text, false);
            } catch (error) {
                addMessage('Error: Failed to get response. Please try again.', false);
            }
        }

        // 绑定点击和回车事件
        sendBtn.addEventListener('click', send);
        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
