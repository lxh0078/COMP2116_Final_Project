<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus AI Assistant</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
        body {background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;}
        .container {background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 800px; padding: 30px;}
        h1 {color: #2d3748; text-align: center; margin-bottom: 30px;}
        .chat-box {height: 500px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; overflow-y: auto; margin-bottom: 20px; background: #f7fafc;}
        .message {margin-bottom: 15px; padding: 12px 16px; border-radius: 8px; max-width: 80%;}
        .user-message {background: #3182ce; color: #fff; margin-left: auto;}
        .ai-message {background: #e2e8f0; color: #2d3748; margin-right: auto;}
        .input-area {display: flex; gap: 10px;}
        #questionInput {flex: 1; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px;}
        #sendBtn {padding: 12px 24px; background: #3182ce; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Campus AI Assistant</h1>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Ask a question in English...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');

        // 🔥 中文输入拦截：只允许英文字母、数字、英文符号
        input.addEventListener('input', (e) => {
            const value = e.target.value;
            // 匹配非英文字符，直接替换为空
            e.target.value = value.replace(/[^a-zA-Z0-9\s.,!?@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/g, '');
        });

        function addMessage(content, isUser) {
            const msg = document.createElement('div');
            msg.className = isUser ? 'message user-message' : 'message ai-message';
            msg.textContent = content;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendQuestion() {
            const q = input.value.trim();
            if (!q) return;

            addMessage(q, true);
            input.value = '';

            try {
                const res = await fetch(`/api/ai/ask?question=${encodeURIComponent(q)}`);
                const text = await res.text();
                addMessage(text, false);
            } catch (err) {
                addMessage('Error: Failed to get response.', false);
            }
        }

        sendBtn.addEventListener('click', sendQuestion);
        input.addEventListener('keydown', (e) => e.key === 'Enter' && sendQuestion());
    </script>
</body>
</html>
